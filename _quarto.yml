project:
  type: book
  output-dir: _book

book:
  title: Society in Silico
  subtitle: Simulation as Infrastructure for Collective Reasoning
  author: Max Ghenis
  chapters:
    - index.md
    - manuscript/front-matter/00-preface.md
    - manuscript/front-matter/01-introduction.md
    - part: "Part I: Origins"
      chapters:
        - manuscript/part-1-origins/01-birth-of-microsimulation.md
        - manuscript/part-1-origins/02-tax-model-wars.md
        - manuscript/part-1-origins/03-open-source-revolution.md
        - manuscript/part-1-origins/04-the-accuracy-question.md
    - part: "Part II: Building"
      chapters:
        - manuscript/part-2-building/05-policyengine-proof-of-concept.md
        - manuscript/part-2-building/06-three-ingredients-microsimulation.md
        - manuscript/part-2-building/07-the-household-view.md
        - manuscript/part-2-building/08-the-society-view.md
        - manuscript/part-2-building/09-ai-enters-the-picture.md
        - manuscript/part-2-building/10-cosilico-infrastructure-for-the-future.md
    - part: "Part III: Research Directions"
      chapters:
        - manuscript/part-3-future/11-the-uncertainty-gap.md
        - manuscript/part-3-future/12-simulating-opinion.md
        - manuscript/part-3-future/13-simulating-democracy.md
        - manuscript/part-3-future/14-simulating-values.md
        - manuscript/part-3-future/15-society-in-silico.md

bibliography: references.bib
lang: en-US

format:
  html:
    toc: true
  pdf:
    toc: true
    documentclass: book
    geometry:
      - top=0.75in
      - bottom=0.75in
      - left=0.875in
      - right=0.625in
    fontsize: 11pt
    linestretch: 1.15
