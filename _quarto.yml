project:
  type: book
  output-dir: _book

book:
  title: Society in Silico
  subtitle: Simulating futures to build the one we want
  author: Max Ghenis
  chapters:
    - index.md
    - manuscript/front-matter/00-preface.md
    - manuscript/front-matter/01-introduction.md
    - part: "Part I: The closed stack"
      chapters:
        - manuscript/part-1-closed-stack/01-birth-of-microsimulation.md
        - manuscript/part-1-closed-stack/02-tax-model-wars.md
        - manuscript/part-1-closed-stack/03-the-accuracy-question.md
        - manuscript/part-1-closed-stack/04-a-wall-of-frustration.md
    - part: "Part II: The open engine"
      chapters:
        - manuscript/part-2-open-engine/05-proof-of-concept.md
        - manuscript/part-2-open-engine/06-the-household-and-the-society.md
        - manuscript/part-2-open-engine/07-three-ingredients.md
    - part: "Part III: The agent turn"
      chapters:
        - manuscript/part-3-agent-turn/08-the-ai-cant-do-your-taxes.md
        - manuscript/part-3-agent-turn/09-encoding-the-law.md
        - manuscript/part-3-agent-turn/10-the-verification-problem.md
        - manuscript/part-3-agent-turn/11-microsimulation-anywhere.md
        - manuscript/part-3-agent-turn/12-the-decomposition.md
    - part: "Part IV: The prediction pole"
      chapters:
        - manuscript/part-4-prediction/13-the-uncertainty-gap.md
        - manuscript/part-4-prediction/14-simulating-opinion.md
    - part: "Part V: The horizon"
      chapters:
        - manuscript/part-5-horizon/15-simulating-democracy.md
        - manuscript/part-5-horizon/16-simulating-values.md
        - manuscript/part-5-horizon/17-society-in-silico.md

bibliography: references.bib
lang: en-US

format:
  html:
    toc: true
  pdf:
    toc: true
    documentclass: book
    geometry:
      - top=0.75in
      - bottom=0.75in
      - left=0.875in
      - right=0.625in
    fontsize: 11pt
    linestretch: 1.15
