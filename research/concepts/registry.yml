concepts:
- id: microsimulation
  name: microsimulation
  definition: Computing a policy on each simulated household or person and summing the results, instead
    of modeling the economy as aggregate equations.
  introduced_in: manuscript/front-matter/01-introduction.md
  aliases:
  - microanalytic simulation
  - microsimulation model
  - microsimulation models
  related:
  - aggregation-problem
  - tax-benefit-model
  - synthetic-population
  - static-vs-dynamic-modeling
  obsidian_note: research/concepts/microsimulation-definition.md
- id: aggregation-problem
  name: the aggregation problem
  definition: The mathematical fact that averaging inputs before applying a nonlinear rule gives a different
    (and wrong) answer than applying the rule to each unit and then summing.
  introduced_in: manuscript/part-1-closed-stack/01-birth-of-microsimulation.md
  aliases:
  - aggregation problem
  - aggregation itself
  - problem with averages
  related:
  - microsimulation
  obsidian_note: null
- id: static-vs-dynamic-modeling
  name: static vs dynamic modeling
  definition: Static models compute the day-one effect of a policy with behavior held fixed; dynamic models
    age the population forward or let behavior and the economy respond.
  introduced_in: manuscript/part-1-closed-stack/01-birth-of-microsimulation.md
  aliases:
  - static microsimulation
  - dynamic microsimulation
  - dynamic scoring
  - static model
  - static score
  - dynamic estimate
  related:
  - microsimulation
  - budget-scoring
  - behavioral-response
  obsidian_note: null
- id: tax-benefit-model
  name: tax-benefit model
  definition: A microsimulation model that computes both the taxes owed and the benefits received by a
    household, capturing how the two interact.
  introduced_in: manuscript/part-1-closed-stack/02-tax-model-wars.md
  aliases:
  - tax-benefit model
  - tax-benefit microsimulation model
  - tax and benefit model
