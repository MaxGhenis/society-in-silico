- id: conformance-ratchet
  name: conformance ratchet
  definition: A CI gate configured as a one-way valve, under which tested coverage may only rise and unexplained
    mismatches may only fall, so correctness cannot silently rot.
  introduced_in: manuscript/part-3-agent-turn/10-the-verification-problem.md
