- id: disposition
  name: disposition
  definition: An evidence-backed explanation that closes an oracle mismatch — an arithmetic reconciliation,
    a statutory citation, or a documented convention — so a raw gap is either dispositioned or counts
    as unexplained.
  introduced_in: manuscript/part-3-agent-turn/10-the-verification-problem.md
