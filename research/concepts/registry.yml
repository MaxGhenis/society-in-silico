  - marginal-tax-rate
  obsidian_note: null
- id: top-coding
  name: top-coding
  definition: Masking the highest incomes in public survey and tax files — collapsing them into a single
    category or an average — so the top tail is blurred for privacy.
  introduced_in: manuscript/part-1-closed-stack/02-tax-model-wars.md
  aliases:
  - top-coding
