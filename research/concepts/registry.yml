- id: admission-rule
  name: the admission rule (per-unit verifiability)
  definition: A simulation is admissible only where its verification chain terminates in ground truth
    — an oracle parity, a statutory exactness, a calibrated marginal, or a forecast score — checkable
    one unit at a time.
  introduced_in: index.md
  aliases:
