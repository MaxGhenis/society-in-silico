- id: budget-scoring
  name: budget scoring
  definition: Producing an official estimate of a bill's cost — the projected change in revenue or spending
    over a budget window — that decides whether it can proceed.
  introduced_in: manuscript/part-1-closed-stack/02-tax-model-wars.md
