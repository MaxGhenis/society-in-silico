- id: forecast-calibration
  name: forecast calibration
  definition: In the forecasting sense, a stated probability is calibrated when events predicted at 60
    percent happen close to 60 percent of the time — verified against outcomes and recalibrated when it
    drifts (distinct from data calibration).
  introduced_in: manuscript/part-4-prediction/13-the-uncertainty-gap.md
