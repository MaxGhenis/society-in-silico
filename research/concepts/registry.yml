  obsidian_note: null
- id: survey-microdata
  name: survey microdata
  definition: The household-level records from surveys like the Current Population Survey that supply
    a model its people, imperfect because respondents misreport and the very rich are undersampled.
  introduced_in: manuscript/part-1-closed-stack/03-the-accuracy-question.md
