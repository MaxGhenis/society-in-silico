- id: calibration-reweighting
  name: calibration and reweighting
  definition: Adjusting each survey record's weight — how many people it represents — so the weighted
    totals reproduce the administrative aggregates the government publishes.
  introduced_in: manuscript/part-1-closed-stack/02-tax-model-wars.md
