  obsidian_note: null
- id: administrative-data
  name: administrative data
  definition: The records governments hold or publish from running programs — tax returns, benefit rolls,
    agency totals — used as the ground truth a model is checked against.
  introduced_in: index.md
  aliases:
  - administrative data
  - administrative records
